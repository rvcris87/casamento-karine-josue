<section class="compartilhar-fotos" id="fotos-section">
    <div class="container">
        <div class="compartilhar-header">
            <h2 class="compartilhar-titulo">Compartilhe Suas Fotos</h2>
            <p class="compartilhar-subtitulo">Registre esse momento com a gente</p>
        </div>

        <!-- Mensagens de Flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-container">
                    {% for category, message in messages %}
                        <div class="flash-message flash-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="form-card">
            <form method="POST" action="{{ url_for('fotos.enviar_foto') }}" enctype="multipart/form-data" class="compartilhar-form">
                
                <div class="form-field">
                    <input 
                        type="text" 
                        id="nome" 
                        name="nome" 
                        placeholder="Seu nome" 
                        required
                        minlength="3"
                        maxlength="255"
                        class="form-input"
                    >
                </div>

                <div class="form-field">
                    <textarea 
                        id="legenda" 
                        name="legenda" 
                        placeholder="Uma mensagem ou descrição (opcional)" 
                        rows="3"
                        maxlength="500"
                        class="form-input form-textarea"
                    ></textarea>
                </div>

                <div class="form-field">
                    <label for="fotos" class="upload-label">
                        <div class="upload-area">
                            <div class="upload-icon">📸</div>
                            <p class="upload-texto">Clique ou arraste suas fotos</p>
                            <small class="upload-info">JPG, PNG, WebP • Até 5MB por foto</small>
                        </div>
                        <input 
                            type="file" 
                            id="fotos" 
                            name="fotos" 
                            multiple
                            accept=".jpg,.jpeg,.png,.webp"
                            required
                            class="file-input-hidden"
                        >
                    </label>
                    <div id="arquivos-selecionados" class="arquivos-lista"></div>
                </div>

                <button type="submit" class="btn-enviar">
                    Enviar Fotos
                </button>
            </form>
        </div>
    </div>
</section>

<style>
.compartilhar-fotos {
    padding: 80px 20px;
    background: #ffffff;
    min-height: auto;
    display: block;
}

.compartilhar-header {
    text-align: center;
    margin-bottom: 30px;
}

.compartilhar-titulo {
    font-family: var(--font-title);
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--text);
    font-weight: 600;
    margin-bottom: 10px;
    letter-spacing: -0.5px;
}

.compartilhar-subtitulo {
    font-family: var(--font-body);
    font-size: 0.95rem;
    color: var(--text-soft);
    font-weight: 300;
    letter-spacing: 0.5px;
}

/* Form Card */
.form-card {
    max-width: 600px;
    margin: 0 auto;
    background: #ffffff;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(63, 70, 80, 0.08);
}

/* Flash Messages */
.flash-container {
    max-width: 600px;
    margin: -40px auto 40px auto;
}

.flash-message {
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 0.95rem;
    text-align: center;
    margin-bottom: 12px;
    animation: slideIn 0.3s ease;
}

.flash-sucesso {
    background: #e8f5e9;
    color: #2e7d32;
    border-left: 4px solid #4caf50;
}

.flash-error,
.flash-erro {
    background: #ffebee;
    color: #c62828;
    border-left: 4px solid #f44336;
}

.flash-warning {
    background: #fff3e0;
    color: #e65100;
    border-left: 4px solid #ff9800;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Formulário */
.compartilhar-form {
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.form-field {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.form-input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    font-family: var(--font-body);
    font-size: 1rem;
    color: var(--text);
    background: #ffffff;
    transition: all 0.3s ease;
    outline: none;
}

.form-input::placeholder {
    color: #9ca3af;
}

.form-input:focus {
    border-color: #a7c7e7;
    box-shadow: 0 0 0 3px rgba(167, 199, 231, 0.1);
    background: #ffffff;
}

.form-textarea {
    resize: vertical;
    min-height: 100px;
}

/* Upload Area */
.upload-label {
    cursor: pointer;
    display: block;
}

.upload-area {
    padding: 40px 24px;
    border: 2px dashed #e5e7eb;
    border-radius: 12px;
    text-align: center;
    background: #ffffff;
    transition: all 0.3s ease;
}

.upload-area:hover {
    border-color: #a7c7e7;
    background: #f8fafc;
}

.upload-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
}

.upload-texto {
    font-family: var(--font-body);
    font-size: 1rem;
    color: var(--text);
    font-weight: 500;
    margin: 0 0 6px 0;
}

.upload-info {
    display: block;
    font-size: 0.85rem;
    color: var(--text-soft);
    margin-top: 6px;
}

.file-input-hidden {
    display: none;
}

/* Arquivos Selecionados */
.arquivos-lista {
    margin-top: 16px;
    display: grid;
    gap: 8px;
}

.arquivo-item {
    padding: 10px 12px;
    background: #e8f4fd;
    border-radius: 8px;
    font-size: 0.9rem;
    color: #0369a1;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Botão */
.btn-enviar {
    padding: 16px 32px;
    background: var(--serenity-strong);
    color: #ffffff;
    border: none;
    border-radius: 12px;
    font-family: var(--font-body);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    letter-spacing: 0.3px;
    margin-top: 8px;
}

.btn-enviar:hover {
    background: #6b8ecb;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(167, 199, 231, 0.3);
}

.btn-enviar:active {
    transform: translateY(0);
}

/* Responsividade */
@media (max-width: 768px) {
    .compartilhar-fotos {
        padding: 70px 20px;
    }

    .compartilhar-header {
        margin-bottom: 40px;
    }

    .compartilhar-titulo {
        font-size: 2.2rem;
    }

    .form-card {
        padding: 32px 24px;
    }

    .compartilhar-form {
        gap: 20px;
    }

    .upload-area {
        padding: 32px 16px;
    }

    .upload-icon {
        font-size: 2rem;
    }
}

@media (max-width: 480px) {
    .compartilhar-fotos {
        padding: 60px 16px;
    }

    .compartilhar-header {
        margin-bottom: 35px;
    }

    .compartilhar-titulo {
        font-size: 1.8rem;
    }

    .form-card {
        padding: 24px 16px;
    }

    .compartilhar-form {
        gap: 18px;
    }

    .form-input {
        font-size: 16px;
    }

    .upload-area {
        padding: 28px 12px;
    }

    .upload-icon {
        font-size: 1.8rem;
        margin-bottom: 10px;
    }

    .upload-texto {
        font-size: 0.95rem;
    }
}
</style>
