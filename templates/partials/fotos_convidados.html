<section class="compartilhar-fotos" id="fotos-section">
    <div class="container-compartilhar">
        <div class="compartilhar-header">
            <h2 class="compartilhar-titulo">Compartilhe Seus Fotos</h2>
            <p class="compartilhar-subtitulo">Registre esse momento com a gente</p>
        </div>

        <!-- Mensagens de Flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-container">
                    {% for category, message in messages %}
                        <div class="flash-message flash-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('fotos.enviar_foto') }}" enctype="multipart/form-data" class="compartilhar-form">
            
            <div class="form-field">
                <input 
                    type="text" 
                    id="nome" 
                    name="nome" 
                    placeholder="Seu nome" 
                    required
                    minlength="3"
                    maxlength="255"
                    class="form-input"
                >
            </div>

            <div class="form-field">
                <textarea 
                    id="legenda" 
                    name="legenda" 
                    placeholder="Uma mensagem ou descrição (opcional)" 
                    rows="3"
                    maxlength="500"
                    class="form-input form-textarea"
                ></textarea>
            </div>

            <div class="form-field">
                <label for="fotos" class="upload-label">
                    <div class="upload-area">
                        <div class="upload-icon">📸</div>
                        <p class="upload-texto">Clique ou arraste suas fotos</p>
                        <small class="upload-info">JPG, PNG, WebP • Até 5MB por foto</small>
                    </div>
                    <input 
                        type="file" 
                        id="fotos" 
                        name="fotos" 
                        multiple
                        accept=".jpg,.jpeg,.png,.webp"
                        required
                        class="file-input-hidden"
                    >
                </label>
                <div id="arquivos-selecionados" class="arquivos-lista"></div>
            </div>

            <button type="submit" class="btn-enviar">
                Enviar Fotos
            </button>
        </form>
    </div>
</section>

<style>
.compartilhar-fotos {
    padding: 100px 20px;
    background: #ffffff;
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container-compartilhar {
    width: 100%;
    max-width: 560px;
}

.compartilhar-header {
    text-align: center;
    margin-bottom: 60px;
}

.compartilhar-titulo {
    font-family: var(--font-title);
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--text);
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
}

.compartilhar-subtitulo {
    font-family: var(--font-body);
    font-size: 1rem;
    color: var(--text-soft);
    font-weight: 300;
    letter-spacing: 0.5px;
}

/* Flash Messages */
.flash-container {
    margin-bottom: 40px;
}

.flash-message {
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 0.95rem;
    text-align: center;
    margin-bottom: 12px;
    animation: slideIn 0.3s ease;
}

.flash-sucesso {
    background: #e8f5e9;
    color: #2e7d32;
    border-left: 4px solid #4caf50;
}

.flash-error,
.flash-erro {
    background: #ffebee;
    color: #c62828;
    border-left: 4px solid #f44336;
}

.flash-warning {
    background: #fff3e0;
    color: #e65100;
    border-left: 4px solid #ff9800;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Formulário */
.compartilhar-form {
    display: flex;
    flex-direction: column;
    gap: 28px;
    background: #fafbfc;
    padding: 48px 32px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(63, 70, 80, 0.05);
}

.form-field {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.form-input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    font-family: var(--font-body);
    font-size: 1rem;
    color: var(--text);
    background: #ffffff;
    transition: all 0.3s ease;
    outline: none;
}

.form-input::placeholder {
    color: #9ca3af;
}

.form-input:focus {
    border-color: #a7c7e7;
    box-shadow: 0 0 0 3px rgba(167, 199, 231, 0.1);
    background: #ffffff;
}

.form-textarea {
    resize: vertical;
    min-height: 100px;
}

/* Upload Area */
.upload-label {
    cursor: pointer;
    display: block;
}

.upload-area {
    padding: 40px 24px;
    border: 2px dashed #e5e7eb;
    border-radius: 12px;
    text-align: center;
    background: #ffffff;
    transition: all 0.3s ease;
}

.upload-area:hover {
    border-color: #a7c7e7;
    background: #f8fafc;
}

.upload-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
}

.upload-texto {
    font-family: var(--font-body);
    font-size: 1rem;
    color: var(--text);
    font-weight: 500;
    margin: 0 0 6px 0;
}

.upload-info {
    display: block;
    font-size: 0.85rem;
    color: var(--text-soft);
    margin-top: 6px;
}

.file-input-hidden {
    display: none;
}

/* Arquivos Selecionados */
.arquivos-lista {
    margin-top: 16px;
    display: grid;
    gap: 8px;
}

.arquivo-item {
    padding: 10px 12px;
    background: #e8f4fd;
    border-radius: 8px;
    font-size: 0.9rem;
    color: #0369a1;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Botão */
.btn-enviar {
    padding: 16px 32px;
    background: var(--serenity-strong);
    color: #ffffff;
    border: none;
    border-radius: 12px;
    font-family: var(--font-body);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    letter-spacing: 0.3px;
    margin-top: 8px;
}

.btn-enviar:hover {
    background: #6b8ecb;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(167, 199, 231, 0.3);
}

.btn-enviar:active {
    transform: translateY(0);
}

/* Responsividade */
@media (max-width: 768px) {
    .compartilhar-fotos {
        padding: 80px 16px;
        min-height: auto;
    }

    .compartilhar-header {
        margin-bottom: 48px;
    }

    .compartilhar-titulo {
        font-size: 2rem;
    }

    .compartilhar-form {
        padding: 32px 20px;
        gap: 24px;
    }

    .upload-area {
        padding: 32px 16px;
    }

    .upload-icon {
        font-size: 2rem;
    }
}

@media (max-width: 480px) {
    .compartilhar-fotos {
        padding: 60px 12px;
    }

    .compartilhar-header {
        margin-bottom: 40px;
    }

    .compartilhar-titulo {
        font-size: 1.8rem;
    }

    .compartilhar-form {
        padding: 24px 16px;
        gap: 20px;
    }

    .form-input {
        font-size: 16px;
    }
}

.fotos-convidados .subtitulo {
    text-align: center;
    color: var(--serenity-light);
    margin-bottom: 40px;
    font-size: 1.1rem;
}

.formulario-fotos {
    max-width: 600px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.form-group {
    margin-bottom: 25px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: var(--serenity);
    font-family: var(--font-title);
}

.form-control {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 1rem;
    transition: border-color 0.3s;
}

.form-control:focus {
    outline: none;
    border-color: var(--serenity);
}

.form-group small {
    display: block;
    margin-top: 5px;
    color: #999;
    font-size: 0.85rem;
}

/* Upload Area */
.upload-area {
    position: relative;
    border: 2px dashed var(--serenity);
    border-radius: 8px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: #f8fcff;
}

.upload-area:hover {
    border-color: var(--serenity-strong);
    background: #f0f8ff;
}

.file-input {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
}

.upload-placeholder p {
    margin: 0;
    color: var(--serenity);
    font-weight: 600;
    font-size: 1.1rem;
}

.upload-placeholder small {
    color: #999;
}

/* Arquivos Selecionados */
.arquivos-lista {
    margin-top: 15px;
    padding: 15px;
    background: #f9f9f9;
    border-radius: 6px;
    display: none;
}

.arquivos-lista.visivel {
    display: block;
}

.arquivo-item {
    padding: 8px 0;
    border-bottom: 1px solid #eee;
    font-size: 0.95rem;
}

.arquivo-item:last-child {
    border-bottom: none;
}

.arquivo-item .nome {
    color: var(--serenity);
    font-weight: 500;
}

.arquivo-item .tamanho {
    color: #999;
    font-size: 0.85rem;
    margin-left: 10px;
}

/* Botão Enviar */
.btn-enviar {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--serenity) 0%, var(--serenity-strong) 100%);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    font-family: var(--font-body);
}

.btn-enviar:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
}

.btn-enviar:active {
    transform: translateY(0);
}

/* Mensagens de Alerta */
.alert {
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.alert-success {
    background: #d4edda;
    color: #155724;
    border-left: 4px solid #28a745;
}

.alert-error {
    background: #f8d7da;
    color: #721c24;
    border-left: 4px solid #dc3545;
}

.alert-warning {
    background: #fff3cd;
    color: #856404;
    border-left: 4px solid #ffc107;
}

.close-alert {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: inherit;
    opacity: 0.7;
    transition: opacity 0.2s;
}

.close-alert:hover {
    opacity: 1;
}

/* Dicas */
.dicas-fotos {
    max-width: 600px;
    margin: 40px auto;
    padding: 25px;
    background: linear-gradient(135deg, #f8fcff 0%, #fff 100%);
    border-left: 4px solid var(--serenity);
    border-radius: 6px;
}

.dicas-fotos h3 {
    color: var(--serenity);
    margin-bottom: 15px;
    font-family: var(--font-title);
}

.dicas-fotos ul {
    list-style: none;
    padding: 0;
}

.dicas-fotos li {
    padding: 8px 0;
    color: #555;
    padding-left: 20px;
    position: relative;
}

.dicas-fotos li:before {
    content: "✓";
    position: absolute;
    left: 0;
    color: var(--serenity);
    font-weight: bold;
}

/* Responsivo */
@media (max-width: 768px) {
    .fotos-convidados {
        padding: 40px 15px;
    }

    .fotos-convidados h2 {
        font-size: 1.8rem;
    }

    .formulario-fotos {
        padding: 20px;
    }

    .upload-area {
        padding: 25px 15px;
    }

    .upload-placeholder p {
        font-size: 1rem;
    }
}
</style>

<script>
function atualizarNomeArquivos(input) {
    const lista = document.getElementById('arquivos-selecionados');
    lista.innerHTML = '';

    if (input.files.length === 0) {
        lista.classList.remove('visivel');
        return;
    }

    let html = '<div style="margin-bottom: 10px;"><strong>Arquivos selecionados:</strong></div>';
    let totalMB = 0;

    for (let file of input.files) {
        const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
        totalMB += parseFloat(sizeMB);
        html += `
            <div class="arquivo-item">
                <span class="nome">📄 ${file.name}</span>
                <span class="tamanho">${sizeMB}MB</span>
            </div>
        `;
    }

    html += `<div style="margin-top: 10px; color: var(--serenity); font-weight: 600;">Total: ${totalMB.toFixed(2)}MB</div>`;
    lista.innerHTML = html;
    lista.classList.add('visivel');
}

// Drag and drop
const uploadArea = document.querySelector('.upload-area');
const fileInput = document.getElementById('fotos');

['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    uploadArea.addEventListener(eventName, preventDefaults, false);
});

function preventDefaults(e) {
    e.preventDefault();
    e.stopPropagation();
}

['dragenter', 'dragover'].forEach(eventName => {
    uploadArea.addEventListener(eventName, () => {
        uploadArea.style.borderColor = 'var(--serenity-strong)';
        uploadArea.style.background = '#f0f8ff';
    }, false);
});

['dragleave', 'drop'].forEach(eventName => {
    uploadArea.addEventListener(eventName, () => {
        uploadArea.style.borderColor = 'var(--serenity)';
        uploadArea.style.background = '#f8fcff';
    }, false);
});

uploadArea.addEventListener('drop', (e) => {
    fileInput.files = e.dataTransfer.files;
    atualizarNomeArquivos(fileInput);
}, false);
</script>
