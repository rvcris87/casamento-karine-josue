<section id="presentes" class="presentes">
    <div class="container">
        <h2 class="titulo-presentes">Lista de Presentes</h2>
        <p class="subtitulo-presentes">Missão: vida de casados 💙</p>

        <div class="grid-presentes">
            {% for presente in presentes %}
            <div class="card-presente {% if presente.status == 'indisponivel' %}indisponivel{% endif %}">
                
                {% if presente.status == 'indisponivel' %}
                    <span class="selo-indisponivel">Indisponível</span>
                {% endif %}

                <img
                    src="{{ url_for('static', filename='img/presentes/' ~ presente.imagem) }}"
                    alt="{{ presente.nome }}"
                >

                <h3>{{ presente.nome }}</h3>

                <p class="valor">{{ presente.valor | brl }}</p>

                {% if presente.status == 'disponivel' %}
                    <button
                        class="btn-presentear abrir-modal-presente"
                        data-id="{{ presente.id }}"
                        data-nome="{{ presente.nome }}"
                        data-valor="{{ presente.valor | brl }}"
                    >
                        Presentear os noivos
                    </button>
                {% else %}
                    <button class="btn-presentear" disabled>
                        Indisponível
                    </button>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </div>
</section>
