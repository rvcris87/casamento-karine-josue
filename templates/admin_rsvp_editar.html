{% extends "base.html" %}

{% block title %}Editar RSVP | Painel Admin{% endblock %}

{% block content %}
<section class="admin-page">
    <div class="admin-header">
        <p class="eyebrow">Painel administrativo</p>
        <h1>Editar confirma&ccedil;&atilde;o</h1>
        <p>Atualize os dados enviados pelo convidado.</p>

        <div class="admin-top-actions">
            <a href="{{ url_for('admin.admin_rsvp') }}" class="btn-outline">Voltar para RSVPs</a>

            <form method="POST" action="{{ url_for('admin.logout_admin') }}" class="logout-form">
                <button type="submit" class="btn-outline">Sair do painel</button>
            </form>
        </div>
    </div>

    <div class="form-box admin-edit-box">
        <form class="rsvp-form" method="POST" action="{{ url_for('admin.editar_rsvp', rsvp_id=rsvp.id) }}">
            <div class="form-grid">
                <div class="form-group">
                    <label for="nome_convidado">Nome</label>
                    <input type="text" id="nome_convidado" name="nome_convidado" value="{{ rsvp.nome_convidado }}" required>
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" name="telefone" value="{{ rsvp.telefone or '' }}">
                </div>

                <div class="form-group">
                    <label for="acompanhantes">Quantidade de acompanhantes</label>
                    <input type="number" id="acompanhantes" name="acompanhantes" min="0" value="{{ rsvp.acompanhantes or 0 }}">
                </div>

                <div class="form-group">
                    <label for="quantidade_criancas">Quantidade de crian&ccedil;as at&eacute; 12 anos</label>
                    <input type="number" id="quantidade_criancas" name="quantidade_criancas" min="0" value="{{ rsvp.quantidade_criancas or 0 }}">
                </div>

                <div class="form-group">
                    <label for="confirmacao">Confirma&ccedil;&atilde;o</label>
                    <select id="confirmacao" name="confirmacao" required>
                        <option value="sim" {% if rsvp.confirmacao == 'sim' %}selected{% endif %}>Sim</option>
                        <option value="nao" {% if rsvp.confirmacao == 'nao' %}selected{% endif %}>N&atilde;o</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="observacao">Observa&ccedil;&atilde;o</label>
                <textarea id="observacao" name="observacao">{{ rsvp.observacao or '' }}</textarea>
            </div>

            <div class="admin-form-actions">
                <button type="submit" class="btn-primary">Salvar altera&ccedil;&otilde;es</button>
                <a href="{{ url_for('admin.admin_rsvp') }}" class="btn-outline">Cancelar</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
